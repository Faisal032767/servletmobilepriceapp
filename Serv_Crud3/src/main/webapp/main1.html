<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        background-color: rgb(31, 31, 31);
        display: grid;
        place-items: center;
        height: 70vh;
      }

      .container {
        background-color: rgb(10, 10, 39);
        width: 400px;
        height: 200px;
        border-radius: 10px;
        border: 1px solid rgb(255, 0, 0,.4);
        display: grid;
        place-items: center;
      }

      ul {
        list-style: none;
        /* background-color: rgb(202, 202, 211); */
        font-size: 1.3em;
        width: 50%;
        height: 90%;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
      }

      ul li {
        text-decoration: none;
      }

      ul li a{
        color: white;
        text-decoration: none;
        background-color: rgb(0, 0, 255,.3);
        padding: 10px;
        display: inline-block;
        width: 100px;
        text-align: center;
        border:1px solid rgb(255, 255, 255,.3);
        border-radius: 8px;
      }
      h1{
        color: white;
      }
      a:hover{
        background-color: rgb(255, 0, 0,.3);
      }
      button:hover{
        background-color: red;
      }
      h1 span{
		  color: yellow;
	  }
    </style>
  </head>
  <body>
    <h1>Welcome To <span>Second Hand Mobile </span>And Its Price </h1>
    <div class="container">
      <ul>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html">Log In</a></li>
        <!-- <li><a href="insertServ">Insert</a></li> -->
      </ul>
    </div>
  </body>
</html>
