<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>login2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: rgb(31, 31, 31);
      }

      #container {
        /* width: ;
        height: 100vh; */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .sub-container {
        width: 401px;
        aspect-ratio: 1;
        margin-top: 50px;
        background: conic-gradient(#ff4545, #00ff99, #006aff, #ff0095, #ff4545);
        background-color: blue;
        background: blue;
        display: grid;
        place-items: center;
        border-radius: 10px;
        backdrop-filter: blur(10px);
      }

      svg {
        fill: rgb(255, 255, 255, 0.8);
      }
      input {
        outline: none;
        border: none;
        border-radius: 5px;
        text-indent: 10px;
        padding: 12px;
        width: 280px;
        background-color: rgb(255, 255, 255, 0.2);
        color: white;
        font-size: 1.1em;

        height: 40px;

        /* height: 10px; */
      }
      input::placeholder {
        color: rgb(255, 255, 255, 0.8);
      }

      button{
        all: unset;
      }

      a{
        text-decoration: none;
        color: white;
      }

      button,a {
        
        padding: 10px;
        border: 1px solid rgb(255, 255, 255, 0.5);
        border-radius: 5px;
        font-size: 1.2em;
        cursor: pointer;
      }

      ul {
        background-color: rgba(33, 34, 43, 0.9);

        /* background-color: transparent; */
        color: white;
        display: flex;
        /* width: 100%;
        height: 60vh; */
        border-radius: 10px;
        /* backdrop-filter: blur(3px); */
        /* box-shadow: 0px 0px 10px 1px rgb(255, 255, 255,.2); */
        width: 99.6%;
        width: 400px;
        aspect-ratio: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      ul li {
        padding: 10px;
        list-style: none;
        /* background-color: red; */
      }

      label {
        /* margin-right: 30px; */
        background-color: rgb(84, 77, 118,.3);
        width: 60px;
        height: 40px;

        border-radius: 5px;
        display: inline-flex;
        justify-content: center;

        align-items: center;
        cursor: pointer;
      }

      ul li:first-of-type {
        font-size: 2.2em;
        color: rgb(12, 226, 250);
        margin-bottom: 20px;
        
    }

      #btn-login{
       margin-right: 20px;
      }

      ul li:last-of-type{
        /* background-color: red; */
        width: 450px;
        text-align: center;
        display: flex;
        justify-content: space-around;
       margin-top: 20px;
    }
      button:hover{
        background-color: rgb(22, 22, 157);
      }

      a:hover{
        background-color: rgb(22, 22, 157);
      }
      
    </style>
  </head>
  <body>
    <form action="loginServ">
		<div id="container">
      <div class="sub-container">
        <ul>
          <li>Log In</li>
         
          <li>
            <label for="email">
              <i class="fa-solid fa-at"></i>
            </label>
            <input type="email" name="email" id="email" placeholder="Email-Id" />
          </li>
          <li>
            <label for="password">
              <i class="fa-solid fa-lock"></i>
            </label>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
            />
          </li>

          
          <li>
            <button id="btn-login">Log In</button>
            <a href="register.html"> Register</a>
        </li>
         
        </ul>
      </div>
    </div>
	</form>
  </body>

 <script>

   // login.addEventListener('click',()=>{
   //    window.location.href='insertServ'
   //})
 </script>
</html>
